# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
#  ◈ IDLE/SUSPEND CONFIGURATION (OBSOLETE)
#  hypridle has been replaced by swayidle (see autostart.conf).
#  Keeping this file for reference only.
#
#  swayidle handles:
#    - Lock before suspend (lid close)
#    - Idle timeout lock (2000s)
#    - DPMS on after resume
#
#  No loginctl, no polkit needed — Lock.qml runs directly via quickshell.
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

general {
    lock_cmd = quickshell -p ~/.config/hypr/scripts/quickshell/Lock.qml
    before_sleep_cmd = loginctl lock-sessions
    after_sleep_cmd = hyprctl dispatch dpms on
}

listener {
    timeout = 2000
    on-timeout = loginctl lock-sessions
}
